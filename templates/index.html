<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Stream Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 500px; height: 70vh; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 14px; }
        .user { align-self: flex-end; background-color: #007bff; color: white; }
        .bot { align-self: flex-start; background-color: #e9e9eb; color: #333; }
        #input-area { border-top: 1px solid #eee; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; overflow-x: auto; }
        a { color: #007bff; text-decoration: none; font-size: 12px; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="chat-container">
        <a href="/history">View Chat History</a>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask Gemini something...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function appendMessage(sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const userDiv = appendMessage('user');
            userDiv.innerText = text;
            userInput.value = '';

            const botDiv = appendMessage('bot');
            botDiv.innerHTML = "<em>Thinking...</em>";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.replace('data: ', ''));
                            fullText += data.text;
                            botDiv.innerHTML = marked.parse(fullText);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
            } catch (e) { botDiv.innerText = "Error connecting to server."; }
        }

        document.getElementById('send-btn').onclick = sendMessage;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
